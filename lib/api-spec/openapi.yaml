openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: early-access
    description: Early access lead capture
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /early-access:
    post:
      operationId: submitEarlyAccess
      tags: [early-access]
      summary: Submit early access lead
      description: Capture a new early access signup lead
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EarlyAccessInput"
      responses:
        "201":
          description: Lead created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EarlyAccessSuccess"
        "400":
          description: Invalid input
        "409":
          description: Email already registered
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    EarlyAccessInput:
      type: object
      required: [name, email]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        email:
          type: string
          format: email
          maxLength: 254
        source:
          type: string
          maxLength: 120
        launchCampaign:
          type: string
          maxLength: 120
    EarlyAccessSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
